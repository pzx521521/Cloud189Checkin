name: Cloud check in action
on:
  push:
    branches:
      - main
  watch:
    types: started
  workflow_dispatch:
  schedule:
    - cron: 55 3 * * *
# 显式声明权限，确保可以删除运行记录和更新仓库活跃度
permissions:
  contents: write
  actions: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: user
    steps:
      - name: 🔌 Check out code
        uses: actions/checkout@main

      - name: 🔨 Setup Node.js environment
        uses: actions/setup-node@main
        with:
          node-version: 18
          cache: npm

      - name: 👾 Check if Debug is true
        if: vars.debug == '1'
        run: |
          echo "CLOUD189_VERBOSE=1" >> $GITHUB_ENV
      
      - name: 📹 Restore cached Cookie
        id: cache-cookie-restore
        uses: actions/cache/restore@v4
        with:
          path: .token
          key: cloud189-token-${{ hashFiles('.token/*.json') }}
          restore-keys: cloud189-token-

      - name: 🔧 Init secrets
        uses: shine1594/secrets-to-env-action@master
        with:
          secrets: ${{ toJSON(secrets) }}
          secrets_env: production
          prefix_prod: ""
          file_name_prod: .env

      - name: 📡 Init dependencies
        run: npm install

      - name: 🚀 Run
        uses: nick-fields/retry@master
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: npm start

      - name: 🔑 Compute token hash
        if: always()
        run: |
          NEW_HASH=$(find .token -name '*.json' -exec sha256sum {} \; 2>/dev/null | sha256sum | cut -d' ' -f1)
          echo "TOKEN_HASH=${NEW_HASH}" >> $GITHUB_ENV

      - name: 📹 Save cached Cookie
        if: always() && env.TOKEN_HASH != ''
        uses: actions/cache/save@v4
        with:
          path: .token
          key: cloud189-token-${{ env.TOKEN_HASH }}

      - name: 🎉 Delete old workflow run
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 50
      - name: 🔄 Keepalive (Empty Commit)
        # 每月的 1 号和 15 号才执行这个步骤
        if: github.event_name == 'schedule' && (github.event.schedule == '55 3 1 * *' || github.event.schedule == '55 3 15 * *')
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit --allow-empty -m "Keepalive: Monthly active pulse"
          git push
          
